<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E2A2B"/><stop offset="1" stop-color="#123638"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8FE3DA"/>
    </marker>
    <marker id="arrW" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F5C84C"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>

  <text x="600" y="64" text-anchor="middle" fill="#EAF7F4" font-size="40" font-weight="800" letter-spacing="6">O S M O S I S</text>
  <text x="600" y="98" text-anchor="middle" fill="#8FE3DA" font-size="19">Osmosis, 팀의 오아시스 — 당신이 잠든 사이, 지식이 스며든다</text>

  <line x1="415" y1="140" x2="415" y2="560" stroke="#2E5B5C" stroke-width="3" stroke-dasharray="4 10"/>
  <line x1="785" y1="140" x2="785" y2="560" stroke="#2E5B5C" stroke-width="3" stroke-dasharray="4 10"/>
  <g fill="#8FE3DA" opacity="0.85">
    <circle cx="400" cy="230" r="4"/><circle cx="428" cy="260" r="3"/><circle cx="409" cy="330" r="3.5"/>
    <circle cx="431" cy="400" r="4"/><circle cx="398" cy="470" r="3"/>
    <circle cx="772" cy="250" r="4"/><circle cx="799" cy="300" r="3"/><circle cx="781" cy="380" r="3.5"/>
    <circle cx="801" cy="450" r="4"/><circle cx="770" cy="500" r="3"/>
  </g>

  <g>
    <rect x="60" y="170" width="300" height="230" rx="16" fill="#173F41" stroke="#2E5B5C"/>
    <text x="210" y="205" text-anchor="middle" fill="#EAF7F4" font-size="18" font-weight="700">개발자 A의 Claude</text>
    <text x="210" y="228" text-anchor="middle" fill="#7FA9A6" font-size="13">금요일, 세션 종료 직전</text>
    <rect x="85" y="248" width="250" height="120" rx="10" fill="#0E2A2B" stroke="#2E5B5C"/>
    <text x="100" y="278" fill="#8FE3DA" font-size="15" font-family="monospace">&gt; /handoff</text>
    <text x="100" y="306" fill="#CFE9E4" font-size="13">✓ table-parser 작업 기록됨</text>
    <text x="100" y="328" fill="#F5C84C" font-size="13" font-weight="700">status: unverified</text>
    <text x="100" y="350" fill="#7FA9A6" font-size="12">"했다"와 "됐다"를 구분해 기록</text>
  </g>

  <g>
    <rect x="455" y="180" width="290" height="300" rx="18" fill="#1B4A4C" stroke="#8FE3DA" stroke-width="2"/>
    <text x="600" y="216" text-anchor="middle" fill="#EAF7F4" font-size="19" font-weight="800">.osmosis/  ×  git</text>
    <text x="600" y="238" text-anchor="middle" fill="#7FA9A6" font-size="12">서버 0 · DB 0 · 데몬 0</text>
    <rect x="480" y="256" width="240" height="64" rx="8" fill="#0E2A2B" stroke="#8FE3DA"/>
    <text x="494" y="281" fill="#8FE3DA" font-size="14" font-weight="700">STATUS.md</text>
    <text x="494" y="303" fill="#CFE9E4" font-size="12">팀 현황 요약 — 항상 2KB 이하</text>
    <rect x="492" y="342" width="216" height="52" rx="8" fill="#0E2A2B" stroke="#2E5B5C" transform="rotate(-2 600 368)"/>
    <rect x="486" y="350" width="216" height="52" rx="8" fill="#0E2A2B" stroke="#2E5B5C" transform="rotate(1.5 600 376)"/>
    <rect x="480" y="358" width="240" height="58" rx="8" fill="#0E2A2B" stroke="#2E5B5C"/>
    <text x="494" y="381" fill="#CFE9E4" font-size="13" font-weight="700">journal/  1작업 = 1파일</text>
    <text x="494" y="402" fill="#7FA9A6" font-size="12">의도 · 결과 · 검증여부 · 기각된 접근</text>
    <text x="600" y="452" text-anchor="middle" fill="#8FE3DA" font-size="14" font-family="monospace">push = 팀 전체 기억 동기화</text>
  </g>

  <g>
    <rect x="840" y="170" width="300" height="270" rx="16" fill="#173F41" stroke="#2E5B5C"/>
    <text x="990" y="205" text-anchor="middle" fill="#EAF7F4" font-size="18" font-weight="700">개발자 B의 Claude</text>
    <text x="990" y="228" text-anchor="middle" fill="#7FA9A6" font-size="13">월요일, 세션 시작한 순간</text>
    <rect x="865" y="248" width="250" height="160" rx="10" fill="#0E2A2B" stroke="#F5C84C" stroke-width="1.5"/>
    <text x="880" y="276" fill="#F5C84C" font-size="15" font-weight="800">⚠ 착수 전 확인</text>
    <text x="880" y="302" fill="#CFE9E4" font-size="13">table-parser: A의 미검증</text>
    <text x="880" y="322" fill="#CFE9E4" font-size="13">엔트리가 열려 있음</text>
    <text x="880" y="352" fill="#8FE3DA" font-size="13" font-weight="700">→ 중복 구현, 시작 전에 차단</text>
    <text x="880" y="380" fill="#7FA9A6" font-size="12">사람은 아무것도 안 했다.</text>
    <text x="880" y="398" fill="#7FA9A6" font-size="12">훅이 자동으로 알려줬다.</text>
  </g>

  <path d="M360 290 C 405 290, 410 290, 452 290" fill="none" stroke="#8FE3DA" stroke-width="3" marker-end="url(#arr)"/>
  <text x="406" y="272" text-anchor="middle" fill="#8FE3DA" font-size="12" font-weight="700">기록</text>
  <path d="M748 290 C 795 290, 795 290, 837 290" fill="none" stroke="#F5C84C" stroke-width="3" marker-end="url(#arrW)"/>
  <text x="793" y="272" text-anchor="middle" fill="#F5C84C" font-size="12" font-weight="700">자동 주입</text>

  <g font-size="15">
    <text x="210" y="530" text-anchor="middle" fill="#FF7A6B" font-weight="700">Before</text>
    <text x="210" y="556" text-anchor="middle" fill="#D9B4AE">같은 삽질 ×2 · 같은 버그 ×2</text>
    <text x="210" y="578" text-anchor="middle" fill="#D9B4AE">"그거 누가 하고 있었죠?"</text>
    <text x="990" y="530" text-anchor="middle" fill="#8FE3DA" font-weight="700">After</text>
    <text x="990" y="556" text-anchor="middle" fill="#CFE9E4">남이 밟은 지뢰, 나는 안 밟는다</text>
    <text x="990" y="578" text-anchor="middle" fill="#CFE9E4">외울 것: /handoff 하나</text>
  </g>
  <text x="600" y="612" text-anchor="middle" fill="#4E7C7B" font-size="12">osmosis v0.1 — bash + git 만으로 동작 · 폐쇄망 OK · 세션당 주입 상한 2KB</text>
</svg>
